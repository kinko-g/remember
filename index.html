<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        padding: 0;
        margin: 0;
    }
    #wrapper {
        position: absolute;
        top: 0;
        left: 0;
        display: flex;
        flex-wrap: wrap;
        width: 100%;
        height: 100vh;
        z-index: -1;
    }
    .pic {
        width: 20%;
        height: 25%;
        opacity: 0;
    }
    
    .hide-wrapper {
        opacity: 0;
        transition: 1s;
        z-index: -1;
    }

    .pic-lazy-render {
        transform: rotateY(360deg);
        transition: 2s;
        opacity: 1;
    }
    
    #content {
        width: 100%;
        height: 100vh;
        z-index: 1;
        display: flex; 
        align-items: center;
        flex-direction: column;
    }

    .header {
        width: 100%;
        text-align: center;
    }
    
    .content {
        width: 100%;
        display: flex;
        align-items: center;
        flex-direction: column;
    }
    #cover {
        width: 20px;
        height: 20px;
        background-color: aliceblue;
        opacity: 0;
        cursor: pointer;
    }
    #article-list {
        width: 60%;
        margin-left: 25px;
    }
</style>
<script>
    window.onload = () => {
        let cover = document.getElementById("cover");
        
        cover.onclick = () => {
            let wrapper = document.getElementById("wrapper");
            wrapper.classList.remove("hide-wrapper");
            wrapper.style.zIndex = 2;

            let pics = document.getElementsByClassName("pic");
            let index = pics.length;
            let timer = setInterval(() => {
                if(index <= 0 ) {
                    clearInterval(timer);
                    return;
                }
                let item = pics.item(-- index);
                item.classList.add("pic-lazy-render");
                item.src = `./src/${index}.jpg`;
            },150);
        }

        wrapper.onclick = () => {
            console.log("wrapper onclick");
            let wrapper = document.getElementById("wrapper");
            wrapper.classList.add("hide-wrapper");
            setTimeout(() => {
                wrapper.style.zIndex = -1;
                let pics = document.getElementsByClassName("pic");
                for(let index = 0;index < pics.length;index ++) {
                    let item = pics.item(index);
                    item.classList.remove("pic-lazy-render");
                    item.src = "";
                }
            },1000);
        }
    }
    
</script>
<body>
    <div id="wrapper">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
        <img class="pic">
    </div>
    <div id="content">
        <div class="header">
            <img src="./src/header.jpg" alt="" style="width: 60%;height: 400px;">
        </div>
        <div class="content">
            <div id="cover"></div>
            <div id="article-list">
                <ul>
                    <li>西安300户人入住烂尾楼,期房政策怎么避免烂尾<span>2022-3-28</span></li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
